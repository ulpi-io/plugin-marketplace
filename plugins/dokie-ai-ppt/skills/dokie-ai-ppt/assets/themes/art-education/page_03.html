<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Core Programs</title>
    <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.1.13/dist/index.global.min.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center font-['Helvetica_Neue']">
    <div class="slide-container w-[1280px] h-[720px] overflow-hidden relative aspect-[16/9] flex flex-col bg-black text-[#FFD700]">
        <div class="relative z-10 flex flex-col flex-grow px-[45px] py-[45px]">
            <!-- Header -->
            <header class="flex-shrink-0 mb-[60px]">
                <!-- Title -->
                <h1 class="text-[115px] font-black uppercase leading-[0.9] tracking-[-0.03em]">Core Programs</h1>
            </header>
            <!-- Main Content -->
            <main class="relative flex-grow flex flex-col">
                <div class="flex flex-col gap-[40px]">
                    <!-- Program Card 1 -->
                    <div class="bg-[#FFD700] text-black rounded-[999px] h-[160px] flex items-center px-[60px] transition-transform duration-300 hover:translate-x-[10px]">
                        <!-- Program Number -->
                        <div class="text-[90px] font-black mr-[50px] w-[120px] leading-none">01</div>
                        <!-- Decorative Element: Arrow Icon -->
                        <svg class="w-[80px] h-[80px] mr-[50px] flex-shrink-0" viewBox="0 0 100 30" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4,15 L90,15" stroke="currentColor" stroke-width="8" fill="none" stroke-linecap="round"/>
                            <path d="M85,5 L95,15 L85,25" stroke="currentColor" stroke-width="8" fill="none" stroke-linejoin="round"/>
                        </svg>
                        <div>
                            <!-- Title -->
                            <h3 class="text-[32px] font-black uppercase mb-2">Study Abroad Selection</h3>
                            <!-- Description -->
                            <p class="text-[18px] font-medium opacity-80">One-on-one guidance to top universities.</p>
                        </div>
                    </div>
                    <!-- Program Card 2 -->
                    <div class="bg-[#FFD700] text-black rounded-[999px] h-[160px] flex items-center px-[60px] transition-transform duration-300 hover:translate-x-[10px]">
                        <!-- Program Number -->
                        <div class="text-[90px] font-black mr-[50px] w-[120px] leading-none">02</div>
                        <!-- Decorative Element: Arrow Icon -->
                        <svg class="w-[80px] h-[80px] mr-[50px] flex-shrink-0" viewBox="0 0 100 30" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4,15 L90,15" stroke="currentColor" stroke-width="8" fill="none" stroke-linecap="round"/>
                            <path d="M85,5 L95,15 L85,25" stroke="currentColor" stroke-width="8" fill="none" stroke-linejoin="round"/>
                        </svg>
                        <div>
                            <!-- Title -->
                            <h3 class="text-[32px] font-black uppercase mb-2">Background Lift</h3>
                            <!-- Description -->
                            <p class="text-[18px] font-medium opacity-80">Internships and competition guidance.</p>
                        </div>
                    </div>
                </div>
            </main>
            <!-- Footer -->
            <footer class="flex-shrink-0 flex items-center justify-between pt-[30px]">
                <!-- Presentation Title -->
                <div id="footer" class="text-[11px] font-medium leading-[1.4] text-[#FFD700] opacity-80">LUMINA ART ACADEMY / Core Programs</div>
                <!-- Brand Badge -->
                <div class="w-[45px] h-[45px] text-[#FFD700]">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="45" stroke="currentColor" stroke-width="5" fill="none"/>
                        <path d="M50,25 Q75,50 50,75 Q25,50 50,25" fill="currentColor"/>
                    </svg>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
