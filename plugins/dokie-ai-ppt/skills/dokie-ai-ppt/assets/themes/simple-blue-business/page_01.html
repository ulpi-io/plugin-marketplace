<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=1280, initial-scale=1.0" name="viewport" />
    <title>2025 SynergyCloud Pre-A Funding Pitch Deck - Left Title Cover</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.1.13/dist/index.global.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet" />
    <style>
        .font-outfit {
            font-family: Outfit, 'PingFang SC', sans-serif;
        }

        .font-inter {
            font-family: Inter, 'PingFang SC', sans-serif;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-[#F3F5F7] font-inter">
    <div
        class="slide-container relative flex flex-col w-[1280px] h-[720px] max-w-[1280px] max-h-[720px] aspect-[16/9] overflow-hidden bg-[linear-gradient(108deg,_#000000_1%,_#475AFE_65%,_rgba(71,90,254,.2)_120%)]">
        <!-- 背景装饰 -->
        <div class="absolute inset-0 pointer-events-none z-0">
            <!-- 顶部装饰线 -->
            <div class="absolute top-[52px] right-20 w-50 h-1 bg-white/20"></div>

            <!-- 底部装饰线 -->
            <div class="absolute bottom-[22px] left-0 w-full h-1 bg-white/20"></div>
        </div>

        <!-- 内容容器 -->
        <div class="relative z-10 flex flex-col justify-between w-full h-full px-20 py-10">
            <!-- 顶部标语区域 -->
            <header class="flex items-center gap-8">
                <p class="text-white text-lg font-semibold">
                    Built for · Global SMBs
                </p>
                <p class="text-white text-base font-light">
                    The Next-Gen Collaborative SaaS Platform
                </p>
            </header>

            <!-- 主标题区域 -->
            <main class="flex flex-col gap-8 pt-9 pb-22">
                <h1 class="max-w-[1040px] text-white text-8xl font-semibold font-outfit">
                    2025 SynergyCloud Pre-A Funding Pitch Deck 
                </h1>
                <p class="max-w-3xl text-white text-[24px] font-light leading-normal">
                    To become the modern work operating system for SMBs worldwide
                </p>
            </main>

            <!-- 底部信息区域 -->
            <footer class="flex items-center gap-8">
                <!-- 作者 -->
                <p class="text-white text-lg font-semibold">
                    SynergyCloud
                </p>
                <!-- 日期 -->
                <p class="text-white text-base font-light">
                    20251021
                </p>
            </footer>
        </div>
    </div>
</body>

</html>
