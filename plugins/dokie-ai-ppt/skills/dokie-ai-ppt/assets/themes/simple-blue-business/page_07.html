<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=1280, initial-scale=1.0" name="viewport" />
    <title>2025 SynergyCloud Pre-A Funding Pitch Deck - Center Title End</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.1.13/dist/index.global.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet" />
    <style>
        .font-outfit {
            font-family: Outfit, 'PingFang SC', sans-serif;
        }

        .font-inter {
            font-family: Inter, 'PingFang SC', sans-serif;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-[#F3F5F7] font-inter">
    <div
        class="slide-container relative flex flex-col w-[1280px] h-[720px] max-w-[1280px] max-h-[720px] aspect-[16/9] overflow-hidden bg-[#f3f5f7]">

        <!-- 背景装饰 -->
        <div class="absolute inset-0 pointer-events-none z-0">
            <!-- 底部装饰线 -->
            <div class="absolute bottom-14 left-1/2 transform -translate-x-1/2 w-[200px] h-1 bg-[#475afe]"></div>
        </div>

        <!-- 主内容区域 -->
        <div class="relative z-10 flex flex-col items-center justify-center w-full h-full">
            <!-- 主标题 -->
            <h1 class="text-black text-8xl font-semibold font-outfit leading-tight">
                Thank you
            </h1>

            <!-- 数据来源信息 -->
            <p class="pt-6 text-[#555] text-xl font-light">
                Our Vision: To become the modern work operating system for SMBs worldwide.
            </p>
        </div>
    </div>
</body>

</html>
