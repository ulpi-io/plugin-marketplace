# Flipside Skill Template
# Docs: https://docs.flipsidecrypto.xyz/skills

name: My Custom Skill             # Human-readable display name
slug: my_custom_skill             # URL-safe identifier (lowercase, underscores)
description: What this skill provides to agents

# Tools this skill grants access to
tools:
  - run_query                     # Execute SQL queries
  - find_tables                   # Search for tables by keyword
  - get_table_schema              # Get column definitions
  # - web_search                  # Search the internet
  # - build_report                # Generate interactive reports with charts

# Domain knowledge (injected into agent context when skill is loaded)
knowledge: |
  # My Custom Skill

  ## Overview
  This skill provides expertise in [domain area].

  ## Key Tables

  | Table | Description |
  |-------|-------------|
  | ethereum.defi.ez_dex_swaps | DEX swap transactions |
  | ethereum.core.ez_token_transfers | Token transfers |

  ## Best Practices

  1. Always filter by date to limit result sizes
  2. Use LOWER() for address comparisons
  3. Check token decimals before calculating amounts

  ## Example Queries

  ### Basic Query
  ```sql
  SELECT *
  FROM ethereum.defi.ez_dex_swaps
  WHERE block_timestamp >= CURRENT_DATE - 7
  LIMIT 100
  ```

# Sections — independently loadable knowledge chunks (optional)
# Agents see section descriptions in their system prompt, then load
