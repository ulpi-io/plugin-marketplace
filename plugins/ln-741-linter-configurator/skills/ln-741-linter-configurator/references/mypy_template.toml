# mypy Configuration Template for Python Projects
# Generated by ln-741-linter-configurator
# Docs: https://mypy.readthedocs.io/
# Format: mypy.toml (supported since mypy 1.11+)
# Alternative: merge into pyproject.toml under [tool.mypy]

[mypy]
# CUSTOMIZE: set to your Python version
python_version = "3.12"

# CUSTOMIZE: list your source directories
files = ["src", "tests"]

# Strict mode (enables all strict checks)
strict = true

# Allow decorators without type stubs (common with web frameworks)
disallow_untyped_decorators = false

# Import handling: require stubs or type hints
ignore_missing_imports = false

# Output
show_error_codes = true
show_column_numbers = true
pretty = true

# Exclude patterns
exclude = [
    ".venv/",
    "build/",
    "dist/",
]

# CUSTOMIZE: add overrides for third-party libraries without type stubs
# [[mypy.overrides]]
# module = [
#     "some_library.*",
#     "another_library.*",
# ]
# ignore_missing_imports = true

# CUSTOMIZE: relax type checking for tests
# [[mypy.overrides]]
# module = "tests.*"
# disallow_untyped_defs = false
# disallow_incomplete_defs = false
# disallow_untyped_decorators = false
