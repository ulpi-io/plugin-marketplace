# Ruff Configuration Template for Python Projects
# Generated by ln-741-linter-configurator
# Ruff replaces: Black, isort, flake8, pyupgrade, autoflake, and many more
# Docs: https://docs.astral.sh/ruff/

# CUSTOMIZE: set to your minimum supported Python version
target-version = "py312"

line-length = 120
indent-width = 4

# CUSTOMIZE: adjust to your project structure
include = ["src/**/*.py", "tests/**/*.py"]
extend-exclude = [
    ".venv",
    "__pycache__",
    "dist",
    "build",
]

[lint]
select = [
    "E",      # pycodestyle errors
    "F",      # Pyflakes (undefined names, unused imports)
    "UP",     # pyupgrade (modernize syntax)
    "B",      # flake8-bugbear (common bugs)
    "SIM",    # flake8-simplify
    "I",      # isort (import sorting)
    "N",      # pep8-naming
    "ASYNC",  # flake8-async (async/await best practices)
    "S",      # flake8-bandit (security)
    "C4",     # flake8-comprehensions
    "C90",    # mccabe (cyclomatic complexity)
    "DTZ",    # flake8-datetimez (timezone-aware datetime)
    "T20",    # flake8-print (no print in production code)
    "RET",    # flake8-return (return statement best practices)
    "PERF",   # perflint (performance anti-patterns)
    "PT",     # flake8-pytest-style
    "FURB",   # refurb (pythonic modernization)
    "LOG",    # flake8-logging (logging best practices)
    "PIE",    # flake8-pie (misc lint)
    "RUF",    # Ruff-specific rules
    "A",      # flake8-builtins (shadowing built-in names)
    "TC",     # flake8-type-checking (TYPE_CHECKING optimization)
    "EM",     # flake8-errmsg (exception message best practices)
    "G",      # flake8-logging-format (logging string formatting)
]

ignore = [
    "S101",   # Allow assert (covered by per-file-ignores for tests)
]

[lint.per-file-ignores]
# CUSTOMIZE: add project-specific overrides below
"tests/**/*.py" = [
    "S101",   # Allow assert in tests
    "S105",   # Allow hardcoded passwords in test fixtures
    "S106",   # Allow hardcoded passwords in test fixtures
    "T201",   # Allow print for debugging
]
"__init__.py" = ["F401"]  # Allow unused imports in __init__
# EXAMPLE: scripts directory
# "scripts/**/*.py" = ["T201"]  # Allow print in utility scripts
# EXAMPLE: config files with hardcoded addresses
# "src/config.py" = ["S104"]  # Docker requires 0.0.0.0 binding

[lint.mccabe]
max-complexity = 10

[lint.flake8-bugbear]
# CUSTOMIZE: add framework-specific immutable calls
# EXAMPLE for FastAPI:
# extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "fastapi.Path", "fastapi.Body"]

[lint.flake8-type-checking]
# CUSTOMIZE: add base classes evaluated at runtime (Pydantic, SQLAlchemy, etc.)
# EXAMPLE:
# runtime-evaluated-base-classes = ["pydantic.BaseModel", "pydantic_settings.BaseSettings"]

[lint.isort]
# CUSTOMIZE: change to your package name
known-first-party = ["src"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
