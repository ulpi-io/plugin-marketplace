<!DOCTYPE html>
<html lang="zh-CN">
<head>

<body class="min-h-screen flex items-center justify-center font-['Inter']">
  <div class="slide-container w-[1280px] h-[720px] overflow-hidden relative aspect-[16/9] flex flex-col bg-black text-white p-6">
    <!-- Hero Title Card -->
    <div class="relative w-full h-[392px] rounded-[196px] bg-[#FF5EDA] flex justify-start items-center flex-shrink-0">

      <div class="ml-[132px] text-black font-black text-[124px] leading-[130px] tracking-[-6.2px] uppercase flex-shrink-0">

        </svg>

        <div class="ml-[34px] w-[245px] font-['Inter'] text-xl text-black leading-normal tracking-[-1px] font-bold uppercase flex-shrink-0">

      </div>
      <!-- Brand Card (Right) -->
      <div class="w-[375px] h-[247px] rounded-[163.5px] bg-white flex flex-col justify-center items-center ml-[31px]">

        <div class="font-['Inter'] text-xl text-black leading-normal tracking-[-1px] font-medium text-center uppercase flex-shrink-0">
          LUMINA&nbsp;ART&nbsp;ACADEMY&nbsp;ART<br>STUDY&nbsp;ABROAD&nbsp;SOLUTIONS
