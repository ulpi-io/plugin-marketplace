<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, initial-scale=1.0">
    <title>PROCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.1.13/dist/index.global.min.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center font-['Helvetica_Neue']">
    <div class="slide-container w-[1280px] h-[720px] overflow-hidden relative aspect-[16/9] flex flex-col bg-[#FF5EDA]">
        <div class="relative z-10 flex flex-col flex-grow px-[45px] py-[45px]">
            <!-- Main Content -->
            <main class="relative flex-grow flex flex-col">
                <div class="flex items-center justify-between w-full h-full">
                    <!-- Decorative Element: Vertical Label (Left) -->
                    <div class="text-[115px] font-black text-black uppercase tracking-[-3px] leading-none" style="writing-mode: sideways-lr; text-orientation: mixed;">START</div>
                    <!-- Process Steps Container -->
                    <div class="flex-1 flex flex-col gap-[22px] px-[50px] justify-center">
                        <!-- Process Step Card 1 -->
                        <div class="bg-black rounded-[999px] h-[130px] flex items-center px-[45px] transition-transform duration-300 hover:translate-x-[10px] w-[88%] ml-0">
                            <!-- Step Number -->
                            <div class="text-5xl font-bold text-white min-w-[70px] mr-[30px]">01</div>
                            <!-- Decorative Element: Arrow Icon -->
                            <svg class="w-[50px] h-[50px] mr-[30px] flex-shrink-0" viewBox="0 0 100 30" xmlns="http://www.w3.org/2000/svg">
                                <path d="M0,15 L90,15 M85,5 L95,15 L85,25" stroke="#FFFFFF" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <!-- Step Label -->
                            <div class="text-white text-[22px] font-medium leading-[1.4]">Evaluation</div>
                        </div>
                        <!-- Process Step Card 2 -->
                        <div class="bg-black rounded-[999px] h-[130px] flex items-center px-[45px] transition-transform duration-300 hover:translate-x-[10px] w-[88%] ml-0">
                            <!-- Step Number -->
                            <div class="text-5xl font-bold text-white min-w-[70px] mr-[30px]">02</div>
                            <!-- Decorative Element: Arrow Icon -->
                            <svg class="w-[50px] h-[50px] mr-[30px] flex-shrink-0" viewBox="0 0 100 30" xmlns="http://www.w3.org/2000/svg">
                                <path d="M0,15 L90,15 M85,5 L95,15 L85,25" stroke="#FFFFFF" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <!-- Step Label -->
                            <div class="text-white text-[22px] font-medium leading-[1.4]">Creation</div>
                        </div>
                        <!-- Process Step Card 3 -->
                        <div class="bg-black rounded-[999px] h-[130px] flex items-center px-[45px] transition-transform duration-300 hover:translate-x-[10px] w-[88%] ml-0">
                            <!-- Step Number -->
                            <div class="text-5xl font-bold text-white min-w-[70px] mr-[30px]">03</div>
                            <!-- Decorative Element: Arrow Icon -->
                            <svg class="w-[50px] h-[50px] mr-[30px] flex-shrink-0" viewBox="0 0 100 30" xmlns="http://www.w3.org/2000/svg">
                                <path d="M0,15 L90,15 M85,5 L95,15 L85,25" stroke="#FFFFFF" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <!-- Step Label -->
                            <div class="text-white text-[22px] font-medium leading-[1.4]">Refinement</div>
                        </div>
                        <!-- Process Step Card 4 -->
                        <div class="bg-black rounded-[999px] h-[130px] flex items-center px-[45px] transition-transform duration-300 hover:translate-x-[10px] w-[88%] ml-0">
                            <!-- Step Number -->
                            <div class="text-5xl font-bold text-white min-w-[70px] mr-[30px]">04</div>
                            <!-- Decorative Element: Arrow Icon -->
                            <svg class="w-[50px] h-[50px] mr-[30px] flex-shrink-0" viewBox="0 0 100 30" xmlns="http://www.w3.org/2000/svg">
                                <path d="M0,15 L90,15 M85,5 L95,15 L85,25" stroke="#FFFFFF" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <!-- Step Label -->
                            <div class="text-white text-[22px] font-medium leading-[1.4]">Admission</div>
                        </div>
                    </div>
                    <!-- Decorative Element: Vertical Label (Right) -->
                    <div class="text-[115px] font-black text-black uppercase tracking-[-3px] leading-none" style="writing-mode: sideways-rl; text-orientation: mixed;">OFFER</div>
                </div>
            </main>
            <!-- Footer -->
            <footer class="flex-shrink-0 flex items-center justify-between pt-[30px]">
                <!-- Presentation Title -->
                <div id="footer" class="text-[11px] font-medium leading-[1.4] text-black opacity-80">LUMINA ART ACADEMY / Process</div>
                <!-- Brand Badge -->
                <div class="w-[45px] h-[45px]">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="45" stroke="#000000" stroke-width="5" fill="none"/>
                        <path d="M50,25 Q75,50 50,75 Q25,50 50,25" fill="#000000"/>
                    </svg>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
