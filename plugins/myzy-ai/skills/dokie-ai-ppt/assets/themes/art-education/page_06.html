<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, initial-scale=1.0">
    <title>3. STRATEGY PHASE</title>
    <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.1.13/dist/index.global.min.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center font-['Helvetica_Neue']">
    <div class="slide-container w-[1280px] h-[720px] overflow-hidden relative aspect-[16/9] flex flex-col bg-[#FF5EDA] text-black">
        <div class="relative z-10 flex flex-col flex-grow px-[45px] py-[45px]">
            <!-- Header -->
            <header class="flex-shrink-0 mb-[30px]">
                <!-- Title -->
                <h1 class="text-[115px] font-black uppercase leading-none tracking-[-0.02em] m-0">3. STRATEGY<br>PHASE</h1>
            </header>
            <!-- Main Content -->
            <main class="relative flex-grow flex flex-col">
                <div class="flex items-center w-full h-full">
                    <!-- Decorative Element: Arrow Graphic (Center) -->
                    <div class="h-[120px] flex w-full">
                        <svg class="w-full h-full" viewBox="0 0 1000 200" xmlns="http://www.w3.org/2000/svg">
                            <path d="M0,100 L900,100" stroke="#000000" stroke-width="80" stroke-linecap="round"/>
                            <polygon points="900,10 1000,100 900,190" fill="#000000"/>
                        </svg>
                    </div>
                </div>
            </main>
            <!-- Footer -->
            <footer class="flex-shrink-0 flex items-center justify-between pt-[30px]">
                <!-- Presentation Title -->
                <div id="footer" class="text-[11px] font-medium leading-[1.4] opacity-80 text-black">LUMINA ART ACADEMY / Strategy Phase</div>
                <!-- Brand Badge -->
                <div class="w-[45px] h-[45px]">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="45" stroke="#000000" stroke-width="5" fill="none"/>
                        <path d="M50,25 Q75,50 50,75 Q25,50 50,25" fill="#000000"/>
                    </svg>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
