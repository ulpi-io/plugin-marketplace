<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Q&A</title>
    <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.1.13/dist/index.global.min.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center font-['Helvetica_Neue']">
    <div class="slide-container w-[1280px] h-[720px] overflow-hidden relative aspect-[16/9] flex flex-col bg-[#FFD700] text-black">
        <div class="relative z-10 flex flex-col flex-grow px-[45px] py-[45px]">
            <!-- Main Content -->
            <main class="flex-grow flex flex-col">
                <div class="flex flex-col w-full h-full gap-4">
                    <!-- Title -->
                    <div class="flex-grow text-[105px] font-black uppercase leading-[0.9] tracking-[-0.03em] -mt-[13px]">
                        ANY QUESTIONS<br>OR THOUGHTS?<br>MAYBE ABOUT<br>YOUR DREAM?
                    </div>
                    <!-- Contact Information Section -->
                    <div class="flex-shrink-0 flex gap-[102px]">
                        <!-- Contact Item 1 -->
                        <div>
                            <!-- Label -->
                            <div class="text-[19px] font-bold block mb-[6px]">Contact</div>
                            <!-- Value -->
                            <span class="text-[19px] font-normal opacity-70">apply@lumina.art</span>
                        </div>
                        <!-- Contact Item 2 -->
                        <div>
                            <!-- Label -->
                            <div class="text-[19px] font-bold block mb-[6px]">WeChat</div>
                            <!-- Value -->
                            <span class="text-[19px] font-normal opacity-70">@Lumina_Official</span>
                        </div>
                    </div>
                </div>
            </main>
            <!-- Footer -->
            <footer class="flex-shrink-0 flex items-center justify-between pt-[30px]">
                <!-- Presentation Title -->
                <div id="footer" class="text-[11px] font-medium leading-[1.4] opacity-80">LUMINA ART ACADEMY / Q&A</div>
                <!-- Brand Badge -->
                <div class="w-[45px] h-[45px]">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="45" stroke="currentColor" stroke-width="5" fill="none"/>
                        <path d="M50,25 Q75,50 50,75 Q25,50 50,25" fill="currentColor"/>
                    </svg>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
