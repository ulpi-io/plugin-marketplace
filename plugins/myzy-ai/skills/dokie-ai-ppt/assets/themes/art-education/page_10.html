<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Thank You</title>
    <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@400;500;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.1.13/dist/index.global.min.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center font-['Helvetica_Neue']">
    <div class="slide-container w-[1280px] h-[720px] overflow-hidden relative aspect-[16/9] flex flex-col bg-[#FFD700]">
        <!-- Content -->
        <div class="relative z-10 flex flex-col flex-grow p-[12px]">
            <!-- Inner Frame Container -->
            <div class="flex px-[45px] py-[45px] flex-col h-full w-full rounded-[20px] overflow-hidden bg-black text-center text-white">
                <!-- Main Content -->
                <div class="flex-grow flex flex-col items-center justify-center">
                    <!-- Subtitle -->
                    <div class="text-[19px] font-medium opacity-60 mb-[14px] tracking-[0.05em]">Thank you for watching</div>
                    <!-- Title -->
                    <div class="text-[115px] font-black uppercase leading-[0.9] tracking-[-0.03em]">
                        WANT TO JOIN US?<br>FOLLOW US:<br><span class="text-[#FF5EDA]">@LUMINA_ART</span>
                    </div>
                </div>
                <!-- Footer -->
                <footer class="w-full flex-shrink-0 flex items-center justify-between pt-[30px]">
                    <!-- Presentation Title -->
                    <div id="footer" class="text-[11px] font-medium leading-[1.4] opacity-80">LUMINA ART ACADEMY / Thank You</div>
                    <!-- Brand Badge -->
                    <div class="w-[45px] h-[45px]">
                        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="50" cy="50" r="45" stroke="currentColor" stroke-width="5" fill="none"/>
                            <path d="M50,25 Q75,50 50,75 Q25,50 50,25" fill="currentColor"/>
                        </svg>
                    </div>
                </footer>
            </div>
        </div>
    </div>
</body>
</html>
