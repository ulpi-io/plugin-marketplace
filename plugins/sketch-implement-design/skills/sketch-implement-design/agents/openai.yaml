interface:
  display_name: "Sketch Implement Design"
  short_description: "Implement Sketch designs via MCP context"
  icon_small: "./assets/sketch-small.svg"
  icon_large: "./assets/sketch.png"
  default_prompt: >
    Use $sketch-implement-design to implement the selected Sketch design in this
    codebase, matching layout, responsive behavior, and 1:1 visual fidelity.

dependencies:
  tools:
    - type: "mcp"
      value: "sketch"
      description: "Sketch MCP server"
      transport: "streamable_http"
      url: "http://localhost:31126/mcp"
